<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Pro</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            bg: '#f0f4f9', darkbg: '#0e0f10',
                            sidebar: '#e9eef6', darksidebar: '#18191a',
                            userBubble: '#e3e3e3', darkUserBubble: '#2a2b2e',
                            aiBubble: '#ffffff', darkAiBubble: '#131314'
                        }
                    },
                    animation: { 'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        
        .prose pre { padding: 0 !important; background-color: #0d1117 !important; overflow: hidden; }
        textarea { resize: none; overflow-y: auto; }
        
        .typing-cursor::after { content: '▋'; animation: blink 1s step-start infinite; color: #3b82f6; }
        @keyframes blink { 50% { opacity: 0; } }
        .thinking-dot { animation: bounce 1.4s infinite ease-in-out both; }
        .thinking-dot:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        @keyframes waveform { 0% { height: 4px; } 50% { height: 16px; } 100% { height: 4px; } }
        .mic-active .wave { animation: waveform 1s ease-in-out infinite; }
    </style>
</head>
<body class="bg-gemini-bg dark:bg-gemini-darkbg text-gray-900 dark:text-gray-100 flex min-h-[100dvh] transition-colors duration-200 overflow-hidden">

    <div id="loading" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-gemini-bg dark:bg-gemini-darkbg">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-40 hidden md:hidden backdrop-blur-sm transition-opacity" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-gemini-sidebar dark:bg-gemini-darksidebar transform -translate-x-full md:translate-x-0 md:relative md:flex md:flex-col transition-transform duration-300 ease-in-out border-r border-gray-200 dark:border-gray-800">
        <div class="p-4 flex items-center justify-between">
            <button onclick="createNewChat()" class="flex-1 flex items-center gap-2 bg-white dark:bg-[#202124] hover:bg-gray-50 dark:hover:bg-[#2a2b2e] text-gray-800 dark:text-gray-200 py-3 px-4 rounded-xl shadow-sm transition-all border border-gray-200 dark:border-gray-700 active:scale-95">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span class="font-medium">New Chat</span>
            </button>
            <button onclick="toggleSidebar()" class="md:hidden ml-2 p-2 text-gray-500 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-full">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="px-4 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">History</div>
        <div id="chat-list" class="flex-1 overflow-y-auto px-2 space-y-1"></div>
        <div class="p-4 border-t border-gray-200 dark:border-gray-800 space-y-2">
            <button onclick="toggleTheme()" class="w-full flex items-center gap-3 px-3 py-3 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors text-sm text-gray-700 dark:text-gray-300">
                <svg id="theme-icon-moon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <svg id="theme-icon-sun" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <span id="theme-text">Switch Theme</span>
            </button>
            <button onclick="openSettings()" class="w-full flex items-center gap-3 px-3 py-3 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors text-sm text-gray-700 dark:text-gray-300">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span>Settings</span>
            </button>
        </div>
    </aside>

    <main id="main-scroll-area" class="flex-1 flex flex-col min-w-0 min-h-[100dvh] relative overflow-y-auto scroll-smooth">
        <header class="sticky top-0 z-10 bg-gemini-bg/80 dark:bg-gemini-darkbg/80 backdrop-blur-md px-4 py-3 flex items-center justify-between border-b border-gray-200/50 dark:border-gray-800/50">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="md:hidden p-2 -ml-2 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-full">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 class="text-xl font-bold bg-gradient-to-r from-blue-500 to-purple-500 bg-clip-text text-transparent">Pro AI</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="createNewChat()" class="p-2 text-gray-500 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded-full transition-colors" title="New Topic">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </button>
                <div id="current-model-badge" class="px-3 py-1.5 text-xs font-medium bg-white dark:bg-[#1e1f20] text-gray-600 dark:text-gray-300 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors" onclick="openSettings()">
                    GPT-like
                </div>
            </div>
        </header>

        <div id="messages-container" class="w-full max-w-4xl mx-auto p-4 md:p-6 space-y-8 flex-1">
            <div id="empty-state" class="hidden h-full flex-col items-center justify-center text-center opacity-70 pb-20 pt-10">
                <div class="w-20 h-20 mb-6 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h2 class="text-3xl font-bold mb-3">How can I help today?</h2>
                <p class="max-w-md text-gray-500 dark:text-gray-400 mb-8">Upload documents, ask complex questions, or generate code.</p>
                
                <div class="flex flex-wrap justify-center gap-2 max-w-2xl">
                    <button onclick="fillPrompt('Explain quantum computing like I am 5 years old.')" class="px-4 py-2 text-sm bg-white dark:bg-[#1e1f20] border border-gray-200 dark:border-gray-700 rounded-full hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">🧠 Explain complex topic</button>
                    <button onclick="fillPrompt('Write a Python script to scrape a website.')" class="px-4 py-2 text-sm bg-white dark:bg-[#1e1f20] border border-gray-200 dark:border-gray-700 rounded-full hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">💻 Write code</button>
                    <button onclick="fillPrompt('Draft a polite follow-up email to my boss.')" class="px-4 py-2 text-sm bg-white dark:bg-[#1e1f20] border border-gray-200 dark:border-gray-700 rounded-full hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">✉️ Draft an email</button>
                </div>
            </div>
        </div>

        <div class="w-full max-w-4xl mx-auto p-4 pb-8 z-10 mt-auto">
            <div class="relative flex items-end bg-white dark:bg-[#1e1f20] rounded-3xl shadow-xl border border-gray-200 dark:border-gray-700 overflow-hidden focus-within:ring-2 focus-within:ring-blue-500/50 transition-shadow p-2">
                <button onclick="triggerFileStub()" class="p-3 text-gray-400 hover:text-blue-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors" title="Attach file">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                </button>
                
                <textarea id="chat-input" rows="1" class="w-full max-h-48 py-3 px-2 bg-transparent border-0 focus:ring-0 text-gray-900 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400 text-[15px] leading-relaxed resize-none" placeholder="Message Pro AI..."></textarea>
                
                <div class="flex items-center gap-1 pr-1 pb-1">
                    <button id="mic-btn" onclick="toggleSpeechRecognition()" class="p-3 text-gray-400 hover:text-red-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors relative" title="Voice typing">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                        <div id="mic-waves" class="absolute inset-0 flex items-center justify-center gap-[2px] opacity-0 transition-opacity pointer-events-none">
                            <div class="w-1 bg-red-500 rounded-full h-2 wave" style="animation-delay: 0s"></div>
                            <div class="w-1 bg-red-500 rounded-full h-4 wave" style="animation-delay: 0.2s"></div>
                            <div class="w-1 bg-red-500 rounded-full h-2 wave" style="animation-delay: 0.4s"></div>
                        </div>
                    </button>
                    
                    <button id="send-btn" onclick="sendMessage()" class="p-3 bg-blue-600 hover:bg-blue-700 text-white rounded-full transition-transform active:scale-90 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center h-11 w-11 shadow-md">
                        <svg id="send-icon" class="w-5 h-5 translate-x-[-1px] translate-y-[1px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                        <svg id="stop-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>
                    </button>
                </div>
            </div>
            <p class="text-center text-xs text-gray-500 dark:text-gray-400 mt-2 font-medium">Pro AI can make mistakes. Check important info.</p>
        </div>

        <button id="scroll-fab" onclick="scrollToBottom()" class="fixed bottom-10 right-6 p-3 bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-200 rounded-full shadow-lg border border-gray-200 dark:border-gray-700 hidden hover:bg-gray-50 dark:hover:bg-gray-700 transition-all z-20 active:scale-95">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
        </button>
    </main>

    <div id="settings-modal" class="fixed inset-0 z-[60] bg-black/60 hidden items-center justify-center opacity-0 transition-opacity duration-300 backdrop-blur-sm">
        <div class="bg-white dark:bg-[#1e1f20] rounded-2xl shadow-2xl w-full max-w-lg p-6 transform scale-95 transition-transform duration-300 m-4 border border-gray-200 dark:border-gray-800">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-gray-900 dark:text-white">Settings</h3>
                <button onclick="closeSettings()" class="text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 p-2 rounded-full transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="space-y-6">
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Account Integration <span class="text-red-500">*</span></label>
                    <button id="login-btn" onclick="loginWithPollinations()" class="w-full flex items-center justify-center gap-2 bg-[#131314] hover:bg-black text-white dark:bg-white dark:text-black dark:hover:bg-gray-200 font-bold py-3 px-4 rounded-xl transition-all shadow-md active:scale-95">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        Login with Pollinations
                    </button>
                    <input type="password" id="api-key-input" class="w-full mt-3 bg-gray-50 dark:bg-[#131314] border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3 outline-none transition-all" placeholder="Enter key manually (sk_... or pk_...)">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">AI Model (Type ANY model ID)</label>
                    <input type="text" id="model-select" list="model-options" class="w-full bg-gray-50 dark:bg-[#131314] border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3 outline-none transition-all" placeholder="e.g. openai, flux, wan-fast" autocomplete="off">
                    <datalist id="model-options">
                        <option value="openai">OpenAI (GPT-4o style)</option>
                        <option value="mistral">Mistral Nemo</option>
                        <option value="mistral-large">Mistral Large</option>
                        <option value="llama">Llama 3.3 70B</option>
                        <option value="qwen">Qwen 2.5 72B</option>
                        <option value="qwen-coder">Qwen Coder 32B</option>
                        <option value="deepseek">DeepSeek V3</option>
                        <option value="deepseek-reasoner">DeepSeek R1</option>
                        <option value="claude">Claude 3.5 Sonnet</option>
                        <option value="gemini">Gemini 1.5 Pro</option>
                        <option value="gemini-thinking">Gemini 2.0 Flash Thinking</option>
                        <option value="search">Search (Web Grounded)</option>
                        <option value="flux">Flux (High Quality)</option>
                        <option value="nanobanana">Nano Banana</option>
                        <option value="z-image-turbo">Z-Image Turbo (Fast)</option>
                        <option value="wan-fast">Wan 2.2 (Fast)</option>
                        <option value="flux-klein">Flux Klein</option>
                        <option value="amazon-nova-reel">Amazon Nova Reel (Video)</option>
                    </datalist>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">System Prompt</label>
                    <textarea id="system-prompt-input" rows="3" class="w-full bg-gray-50 dark:bg-[#131314] border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3 outline-none resize-none" placeholder="You are a helpful AI assistant..."></textarea>
                </div>
            </div>
            <div class="mt-8 flex justify-end">
                <button onclick="saveSettings()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-6 rounded-xl transition-transform active:scale-95 w-full md:w-auto shadow-md">
                    Save Configuration
                </button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-[70] flex flex-col gap-2"></div>

    <script>
        // =======================================================================
        // APP INTEGRATION: Developer earning pollen. Swapped with real key starting with 'pk_'
        // =======================================================================
        const DEVELOPER_APP_KEY = 'pk_YOUR_APP_KEY_HERE'; // Replace with actual pk_ key.

        const DEFAULT_SETTINGS = { apiKey: '', model: 'openai', systemPrompt: '', theme: 'dark' };
        
        let appState = {
            chats: [],
            currentChatId: null,
            settings: { ...DEFAULT_SETTINGS },
            isGenerating: false,
            abortController: null,
            speechSynth: window.speechSynthesis || null,
            recognition: null
        };

        const renderer = new marked.Renderer();
        renderer.code = function(code, language) {
            const validLanguage = hljs.getLanguage(language) ? language : 'plaintext';
            const highlightedCode = hljs.highlight(validLanguage, code).value;
            return `
                <div class="relative group my-4 rounded-xl overflow-hidden bg-[#0d1117] border border-gray-700 font-sans">
                    <div class="flex items-center justify-between px-4 py-2 bg-[#161b22] border-b border-gray-700 text-xs text-gray-400 font-medium">
                        <span>${validLanguage}</span>
                        <button onclick="copyToClipboard(\`${code.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`, this)" class="flex items-center gap-1 hover:text-white transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                            <span>Copy</span>
                        </button>
                    </div>
                    <pre class="p-4 m-0 text-sm overflow-x-auto"><code class="hljs ${validLanguage}">${highlightedCode}</code></pre>
                </div>`;
        };
        marked.setOptions({ renderer: renderer, breaks: true, gfm: true });

        async function downloadImage(url, filename) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
            } catch (e) {
                window.open(url, '_blank');
            }
        }

        function loginWithPollinations() {
            const redirectUrl = encodeURIComponent(window.location.origin + window.location.pathname);
            window.location.href = `https://enter.pollinations.ai/authorize?redirect_url=${redirectUrl}&app_key=${DEVELOPER_APP_KEY}`;
        }

        function init() {
            if (window.location.hash.includes('api_key=')) {
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const newKey = hashParams.get('api_key');
                if (newKey) {
                    appState.settings.apiKey = newKey;
                    window.location.hash = ''; 
                    setTimeout(() => showToast('Successfully logged in with Pollinations!'), 500);
                }
            }

            try {
                const savedChats = localStorage.getItem('univ_ai_chats');
                if (savedChats) appState.chats = JSON.parse(savedChats);
                const savedSettings = localStorage.getItem('univ_ai_settings');
                if (savedSettings) appState.settings = { ...DEFAULT_SETTINGS, ...JSON.parse(savedSettings) };
                const savedCurrentChatId = localStorage.getItem('univ_ai_current_chat');
                if (savedCurrentChatId && appState.chats.some(c => c.id === savedCurrentChatId)) {
                    appState.currentChatId = savedCurrentChatId;
                }
            } catch (e) { console.error("Parse error", e); }

            if (!localStorage.getItem('univ_ai_settings')) {
                const prefersDark = window.matchMedia ? window.matchMedia('(prefers-color-scheme: light)').matches === false : true;
                appState.settings.theme = prefersDark ? 'dark' : 'light';
            }
            applyTheme(appState.settings.theme);

            if (appState.chats.length === 0) createNewChat(false);
            if (!appState.currentChatId && appState.chats.length > 0) appState.currentChatId = appState.chats[0].id;

            setupEventListeners();
            initSpeechRecognition();
            renderChatList();
            renderCurrentChat();
            updateModelBadge();

            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                if (!appState.settings.apiKey) openSettings();
            }, 500);
        }

        function setupEventListeners() {
            const chatInput = document.getElementById('chat-input');
            chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 192) + 'px';
                if (this.value.trim() === '') this.style.height = 'auto';
            });
            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if(appState.isGenerating) toggleStop();
                    else sendMessage();
                }
            });

            const mainScroll = document.getElementById('main-scroll-area');
            const fab = document.getElementById('scroll-fab');
            if (mainScroll && fab) {
                mainScroll.addEventListener('scroll', () => {
                    if (mainScroll.scrollTop > 300) {
                        fab.classList.remove('hidden');
                    } else {
                        fab.classList.add('hidden');
                    }
                });
            }
        }

        function hapticPlay(pattern = 50) {
            if (navigator && navigator.vibrate) {
                try { navigator.vibrate(pattern); } catch(e){}
            }
        }

        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                appState.recognition = new SpeechRecognition();
                appState.recognition.continuous = false;
                appState.recognition.interimResults = true;
                
                appState.recognition.onstart = () => {
                    document.getElementById('mic-btn').classList.add('text-red-500');
                    document.querySelector('#mic-btn svg').classList.add('opacity-0');
                    document.getElementById('mic-waves').classList.remove('opacity-0');
                    document.getElementById('mic-waves').classList.add('opacity-100');
                    document.getElementById('chat-input').placeholder = "Listening...";
                    hapticPlay();
                };
                
                appState.recognition.onresult = (event) => {
                    let text = Array.from(event.results).map(r => r[0].transcript).join('');
                    const input = document.getElementById('chat-input');
                    input.value = text;
                    input.dispatchEvent(new Event('input'));
                };
                
                appState.recognition.onend = () => {
                    resetMicUI();
                    if (document.getElementById('chat-input').value.trim() !== '') {
                        setTimeout(() => sendMessage(), 500);
                    }
                };
                appState.recognition.onerror = () => resetMicUI();
            }
        }

        function resetMicUI() {
            document.getElementById('mic-btn').classList.remove('text-red-500');
            document.querySelector('#mic-btn svg').classList.remove('opacity-0');
            document.getElementById('mic-waves').classList.add('opacity-0');
            document.getElementById('mic-waves').classList.remove('opacity-100');
            document.getElementById('chat-input').placeholder = "Message Pro AI...";
        }

        function toggleSpeechRecognition() {
            if (!appState.recognition) {
                showToast("Voice typing is not supported in this browser.");
                return;
            }
            if (document.getElementById('mic-waves').classList.contains('opacity-100')) {
                appState.recognition.stop();
            } else {
                appState.recognition.start();
            }
        }

        function saveData() {
            localStorage.setItem('univ_ai_chats', JSON.stringify(appState.chats));
            localStorage.setItem('univ_ai_settings', JSON.stringify(appState.settings));
            if (appState.currentChatId) localStorage.setItem('univ_ai_current_chat', appState.currentChatId);
        }

        function scrollToBottom() {
            const container = document.getElementById('main-scroll-area');
            if (container) {
                container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
            }
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg text-sm animate-[bounce_0.3s_ease-out]';
            toast.textContent = msg;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'transition-opacity');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        function renderChatList() {
            const listEl = document.getElementById('chat-list');
            if (!listEl) return;
            listEl.innerHTML = '';
            
            const sortedChats = [...appState.chats].sort((a, b) => b.updatedAt - a.updatedAt);
            sortedChats.forEach(chat => {
                const isActive = chat.id === appState.currentChatId;
                const div = document.createElement('div');
                div.className = `group flex items-center justify-between px-3 py-2.5 rounded-xl cursor-pointer transition-colors ${isActive ? 'bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 font-medium' : 'hover:bg-gray-200 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300'}`;
                
                const titleSpan = document.createElement('span');
                titleSpan.className = 'truncate flex-1 text-sm';
                titleSpan.textContent = chat.title || 'New Chat';
                titleSpan.onclick = () => selectChat(chat.id);

                const actionsDiv = document.createElement('div');
                actionsDiv.className = `flex items-center gap-1 ${isActive ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'} transition-opacity`;

                const delBtn = document.createElement('button');
                delBtn.innerHTML = `<svg class="w-4 h-4 hover:text-red-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>`;
                delBtn.className = 'p-1 text-gray-500';
                delBtn.onclick = (e) => { e.stopPropagation(); deleteChat(chat.id); };

                actionsDiv.appendChild(delBtn);
                div.appendChild(titleSpan);
                div.appendChild(actionsDiv);
                listEl.appendChild(div);
            });
        }

        function renderCurrentChat() {
            const container = document.getElementById('messages-container');
            const emptyState = document.getElementById('empty-state');
            if (!container || !emptyState) return;

            const currentChat = appState.chats.find(c => c.id === appState.currentChatId);
            Array.from(container.children).forEach(child => {
                if (child.id !== 'empty-state') child.remove();
            });

            if (!currentChat || currentChat.messages.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }

            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');

            currentChat.messages.forEach((msg, index) => {
                container.appendChild(createMessageElement(msg, index));
            });
            scrollToBottom();
        }

        function createMessageElement(msg, index, isStreaming = false, isThinking = false) {
            const div = document.createElement('div');
            const isUser = msg.role === 'user';
            div.className = `flex w-full group ${isUser ? 'justify-end' : 'justify-start gap-4'}`;
            div.dataset.index = index;

            if (!isUser) {
                const avatar = document.createElement('div');
                avatar.className = 'hidden md:flex flex-shrink-0 w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 items-center justify-center text-white mt-1 shadow-sm';
                avatar.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>`;
                div.appendChild(avatar);
            }

            const bubbleContainer = document.createElement('div');
            bubbleContainer.className = `flex flex-col ${isUser ? 'items-end max-w-[85%] md:max-w-[70%]' : 'max-w-[100%] md:max-w-[80%]'}`;

            const bubble = document.createElement('div');
            
            if (isUser) {
                bubble.className = 'relative px-5 py-3.5 rounded-[24px] rounded-tr-sm bg-gemini-userBubble dark:bg-gemini-darkUserBubble text-gray-900 dark:text-gray-100 whitespace-pre-wrap text-[15px] leading-relaxed group-hover:pr-10 transition-all';
                bubble.textContent = msg.content;
                
                const editBtn = document.createElement('button');
                editBtn.className = 'absolute right-3 top-3.5 text-gray-500 hover:text-blue-500 opacity-0 group-hover:opacity-100 transition-opacity';
                editBtn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>`;
                editBtn.onclick = () => editPrompt(msg.content, index);
                bubble.appendChild(editBtn);
            } else {
                bubble.className = 'px-1 py-1 text-gray-900 dark:text-gray-100 prose dark:prose-invert max-w-none prose-p:leading-relaxed break-words';
                
                if (isThinking) {
                    bubble.innerHTML = `<div class="flex gap-1.5 items-center h-6 px-2 text-blue-500"><div class="w-2 h-2 rounded-full bg-current thinking-dot"></div><div class="w-2 h-2 rounded-full bg-current thinking-dot"></div><div class="w-2 h-2 rounded-full bg-current thinking-dot"></div></div>`;
                } else {
                    bubble.innerHTML = marked.parse(msg.content || '');
                    if (isStreaming) bubble.classList.add('typing-cursor');
                }
            }
            bubbleContainer.appendChild(bubble);

            const isImageMessage = typeof msg.content === 'string' && msg.content.includes('<img src="https://image.pollinations.ai');
            if (!isUser && !isStreaming && !isThinking && msg.content && !isImageMessage) {
                const toolbar = document.createElement('div');
                toolbar.className = 'flex items-center gap-1 mt-2 ml-1 text-gray-400 opacity-0 group-hover:opacity-100 transition-opacity';
                const btnClass = 'p-1.5 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors hover:text-gray-700 dark:hover:text-gray-200';
                
                toolbar.innerHTML += `<button onclick="copyToClipboard(\`${msg.content.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`, this)" class="${btnClass}" title="Copy text"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg></button>`;
                toolbar.innerHTML += `<button onclick="readAloud(this, \`${msg.content.replace(/`/g, '')}\`)" class="${btnClass}" title="Read aloud"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10C3.9 10 3 10.9 3 12s.9 2 2 2h3l4 4V6L8 10H5z"></path></svg></button>`;
                toolbar.innerHTML += `<button onclick="regenerateFrom(${index})" class="${btnClass}" title="Regenerate"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg></button>`;
                toolbar.innerHTML += `<div class="w-px h-4 bg-gray-300 dark:bg-gray-700 mx-1"></div>`;
                toolbar.innerHTML += `<button onclick="this.classList.add('text-green-500')" class="${btnClass}" title="Good response"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.5"></path></svg></button>`;
                toolbar.innerHTML += `<button onclick="this.classList.add('text-red-500')" class="${btnClass}" title="Bad response"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14H5.236a2 2 0 01-1.789-2.894l3.5-7A2 2 0 018.736 3h4.018a2 2 0 01.485.06l3.76.94m-7 10v5a2 2 0 002 2h.096c.5 0 .905-.405.905-.904 0-.715.211-1.413.608-2.008L17 13V4m-7 10h2m5-10h2a2 2 0 01-2 2v6a2 2 0 01-2 2h-2.5"></path></svg></button>`;
                bubbleContainer.appendChild(toolbar);
            }

            div.appendChild(bubbleContainer);
            return div;
        }

        function fillPrompt(text) {
            const input = document.getElementById('chat-input');
            input.value = text;
            input.dispatchEvent(new Event('input'));
            input.focus();
        }

        function triggerFileStub() {
            showToast("Multimodal vision models are coming in a future update!");
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text);
            const originalHtml = btn.innerHTML;
            btn.innerHTML = `<svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
            hapticPlay(30);
            setTimeout(() => btn.innerHTML = originalHtml, 2000);
        }

        function readAloud(btn, text) {
            if (appState.speechSynth && appState.speechSynth.speaking) {
                appState.speechSynth.cancel();
                btn.classList.remove('text-blue-500');
                return;
            }
            if (!appState.speechSynth) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.onend = () => btn.classList.remove('text-blue-500');
            btn.classList.add('text-blue-500');
            appState.speechSynth.speak(utterance);
        }

        function editPrompt(text, index) {
            let chat = appState.chats.find(c => c.id === appState.currentChatId);
            chat.messages = chat.messages.slice(0, index);
            saveData();
            renderCurrentChat();
            fillPrompt(text);
        }

        function regenerateFrom(index) {
            let chat = appState.chats.find(c => c.id === appState.currentChatId);
            const userMsg = chat.messages[index-1];
            if(userMsg && userMsg.role === 'user') {
                chat.messages = chat.messages.slice(0, index-1);
                saveData();
                renderCurrentChat();
                fillPrompt(userMsg.content);
                sendMessage();
            }
        }

        function createNewChat(render = true) {
            if (appState.speechSynth && appState.speechSynth.speaking) appState.speechSynth.cancel();
            const newChat = { id: 'chat_' + Date.now(), title: 'New Chat', messages: [], createdAt: Date.now(), updatedAt: Date.now() };
            appState.chats.unshift(newChat);
            appState.currentChatId = newChat.id;
            saveData();
            if (render) {
                renderChatList();
                renderCurrentChat();
                if (window.innerWidth < 768) toggleSidebar();
            }
        }

        function toggleStop() {
            if (appState.abortController) {
                appState.abortController.abort();
                hapticPlay([50, 100, 50]);
            }
        }

        function updateSendButtonState(generating) {
            const sendBtn = document.getElementById('send-btn');
            const sendIcon = document.getElementById('send-icon');
            const stopIcon = document.getElementById('stop-icon');
            
            if (generating) {
                sendBtn.classList.replace('bg-blue-600', 'bg-red-500');
                sendBtn.classList.replace('hover:bg-blue-700', 'hover:bg-red-600');
                sendIcon.classList.add('hidden');
                stopIcon.classList.remove('hidden');
            } else {
                sendBtn.classList.replace('bg-red-500', 'bg-blue-600');
                sendBtn.classList.replace('hover:bg-red-600', 'hover:bg-blue-700');
                sendIcon.classList.remove('hidden');
                stopIcon.classList.add('hidden');
            }
        }

        async function sendMessage() {
            if (appState.isGenerating) return;
            if (!appState.settings.apiKey) {
                openSettings();
                showToast("Please enter or login with a Pollinations API Key.");
                return;
            }

            const inputEl = document.getElementById('chat-input');
            const text = inputEl.value.trim();
            if (!text) return;

            if (appState.speechSynth && appState.speechSynth.speaking) appState.speechSynth.cancel();

            let chat = appState.chats.find(c => c.id === appState.currentChatId);
            
            if (chat.messages.length === 0) chat.title = text.length > 25 ? text.substring(0, 25) + '...' : text;

            chat.messages.push({ role: 'user', content: text });
            chat.updatedAt = Date.now();
            inputEl.value = '';
            inputEl.style.height = 'auto';
            inputEl.blur(); 

            renderChatList();
            renderCurrentChat();

            const modelStr = appState.settings.model.toLowerCase();
            const imageKeywords = ['flux', 'nanobanana', 'gptimage', 'z-image', 'zimage', 'veo', 'seedance', 'wan', 'qwen-image', 'grok-imagine', 'klein', 'ltx-', 'ltxvideo', 'amazon-nova'];
            const isTextTurbo = modelStr.includes('gpt') || modelStr.includes('claude') || modelStr.includes('mistral');
            const isMediaModel = imageKeywords.some(k => modelStr.includes(k)) && !isTextTurbo;

            if (isMediaModel) {
                appState.isGenerating = true;
                updateSendButtonState(true);
                
                const container = document.getElementById('messages-container');
                const emptyState = document.getElementById('empty-state');
                if(emptyState) { emptyState.classList.add('hidden'); emptyState.classList.remove('flex'); }

                const aiMsgObj = { role: 'assistant', content: '' };
                chat.messages.push(aiMsgObj);
                const aiMsgIndex = chat.messages.length - 1;
                
                const aiNode = createMessageElement(aiMsgObj, aiMsgIndex, false, true);
                container.appendChild(aiNode);
                scrollToBottom();

                try {
                    const seed = Math.floor(Math.random() * 1000000);
                    const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(text)}?model=${appState.settings.model}&nologo=true&seed=${seed}&key=${appState.settings.apiKey}`;
                    
                    const filename = `pollinations-${seed}.jpg`;
                    aiMsgObj.content = `<div class="mt-2"><img src="${imageUrl}" alt="Generated Media" class="rounded-lg max-w-full h-auto shadow-md" onload="scrollToBottom()"/><button onclick="downloadImage('${imageUrl}', '${filename}')" class="mt-3 flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 transition-colors shadow-sm font-semibold w-fit"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg> Download Media</button></div>`;
                    
                    aiNode.innerHTML = '';
                    const freshNode = createMessageElement(aiMsgObj, aiMsgIndex, false, false);
                    aiNode.replaceWith(freshNode);
                    
                } catch (err) {
                    aiMsgObj.content = "**Error:** Failed to load media.";
                    aiNode.querySelector('.prose').innerHTML = marked.parse(aiMsgObj.content);
                } finally {
                    appState.isGenerating = false;
                    updateSendButtonState(false);
                    chat.updatedAt = Date.now();
                    saveData();
                    renderChatList();
                    hapticPlay(50);
                }
                return; 
            }
            
            appState.isGenerating = true;
            updateSendButtonState(true);
            
            const container = document.getElementById('messages-container');
            const emptyState = document.getElementById('empty-state');
            if(emptyState) { emptyState.classList.add('hidden'); emptyState.classList.remove('flex'); }

            const aiMsgObj = { role: 'assistant', content: '' };
            chat.messages.push(aiMsgObj);
            const aiMsgIndex = chat.messages.length - 1;
            
            const aiNode = createMessageElement(aiMsgObj, aiMsgIndex, false, true);
            container.appendChild(aiNode);
            scrollToBottom();

            const apiMessages = [];
            if (appState.settings.systemPrompt) apiMessages.push({ role: 'system', content: appState.settings.systemPrompt });
            apiMessages.push(...chat.messages.slice(0, -1));

            appState.abortController = new AbortController();

            try {
                // FIXED: Pollinations streams raw text directly on its base endpoint. Reading raw stream avoids JSON parse failures.
                const url = `https://text.pollinations.ai/?key=${appState.settings.apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    signal: appState.abortController.signal,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: appState.settings.model, messages: apiMessages })
                });

                if (!response.ok) throw new Error(`HTTP Error ${response.status}: Ensure your API key and Model are valid.`);
                if (!response.body) throw new Error('Streaming not supported');

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let done = false; let isFirstChunk = true;

                while (!done) {
                    const { value, done: readerDone } = await reader.read();
                    done = readerDone;
                    
                    if (value) {
                        if (isFirstChunk) {
                            isFirstChunk = false;
                            aiNode.innerHTML = '';
                            const freshNode = createMessageElement(aiMsgObj, aiMsgIndex, true, false);
                            aiNode.replaceWith(freshNode);
                        }

                        // FIXED: Simply append the raw decoded text instead of strictly expecting `data: {...}`
                        const chunkStr = decoder.decode(value, { stream: true });
                        aiMsgObj.content += chunkStr;

                        const currentAiBubble = document.querySelector(`[data-index="${aiMsgIndex}"] .prose`);
                        if (currentAiBubble) {
                            currentAiBubble.innerHTML = marked.parse(aiMsgObj.content);
                        }
                        const mainScroll = document.getElementById('main-scroll-area');
                        if (mainScroll && (mainScroll.scrollHeight - mainScroll.scrollTop - mainScroll.clientHeight < 100)) {
                            scrollToBottom();
                        }
                    }
                }

                // Check if the final response was actually a raw JSON error object
                if (aiMsgObj.content.startsWith('{') && aiMsgObj.content.includes('"error"')) {
                    try {
                        const errData = JSON.parse(aiMsgObj.content);
                        if (errData.error) throw new Error(errData.error.message || "Invalid Request");
                    } catch(e) {}
                }

            } catch (error) {
                if (error.name === 'AbortError') {
                    aiMsgObj.content += "\n\n*[Generation stopped by user]*";
                    const currentAiBubble = document.querySelector(`[data-index="${aiMsgIndex}"] .prose`);
                    if (currentAiBubble) {
                        currentAiBubble.innerHTML = marked.parse(aiMsgObj.content);
                    }
                } else {
                    console.error("API Error:", error);
                    const errHtml = `
                        <div class="bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 p-3 rounded-lg border border-red-200 dark:border-red-800/50 flex flex-col gap-2 mt-2">
                            <span class="font-bold flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Error</span>
                            <span class="text-sm">${error.message}</span>
                            <button onclick="regenerateFrom(${aiMsgIndex})" class="mt-1 self-start px-3 py-1 bg-red-100 dark:bg-red-900/40 hover:bg-red-200 dark:hover:bg-red-800/60 rounded text-xs font-semibold transition-colors">Retry Connection</button>
                        </div>`;
                    
                    const messageGroupDiv = document.querySelector(`[data-index="${aiMsgIndex}"]`);
                    if(messageGroupDiv) {
                        const proseBubble = messageGroupDiv.querySelector('.prose');
                        if(proseBubble) {
                            proseBubble.innerHTML = errHtml;
                        }
                    }
                }
            } finally {
                appState.isGenerating = false;
                updateSendButtonState(false);
                chat.updatedAt = Date.now();
                saveData();
                renderChatList();
                renderCurrentChat(); 
                scrollToBottom();
                hapticPlay(50);
            }
        }

        function selectChat(id) {
            if (appState.isGenerating) return;
            appState.currentChatId = id;
            saveData(); renderChatList(); renderCurrentChat();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function deleteChat(id) {
            if (!confirm("Delete this conversation?")) return;
            appState.chats = appState.chats.filter(c => c.id !== id);
            if (appState.currentChatId === id) {
                appState.currentChatId = appState.chats.length > 0 ? appState.chats[0].id : null;
                if (!appState.currentChatId) createNewChat(false);
            }
            saveData(); renderChatList(); renderCurrentChat();
        }

        function toggleSidebar() {
            const s = document.getElementById('sidebar'), o = document.getElementById('sidebar-overlay');
            if (s.classList.contains('-translate-x-full')) {
                s.classList.remove('-translate-x-full'); o.classList.remove('hidden');
            } else {
                s.classList.add('-translate-x-full'); o.classList.add('hidden');
            }
        }

        function applyTheme(theme) {
            const h = document.documentElement, m = document.getElementById('theme-icon-moon'), s = document.getElementById('theme-icon-sun');
            if (theme === 'dark') {
                h.classList.add('dark'); if(m) { m.classList.remove('hidden'); s.classList.add('hidden'); }
            } else {
                h.classList.remove('dark'); if(m) { m.classList.add('hidden'); s.classList.remove('hidden'); }
            }
        }

        function toggleTheme() {
            appState.settings.theme = appState.settings.theme === 'dark' ? 'light' : 'dark';
            applyTheme(appState.settings.theme); saveData();
        }

        function updateModelBadge() {
            const badge = document.getElementById('current-model-badge');
            const modelInput = document.getElementById('model-select').value;
            if (badge) badge.textContent = modelInput ? modelInput : 'openai';
        }

        function openSettings() {
            const m = document.getElementById('settings-modal'), mc = m.querySelector('div');
            const keyInput = document.getElementById('api-key-input');
            const loginBtn = document.getElementById('login-btn');
            
            if (appState.settings.apiKey) {
                keyInput.value = appState.settings.apiKey;
                keyInput.classList.remove('hidden');
                loginBtn.textContent = 'Account Linked (Logout)';
                loginBtn.onclick = logoutPollinations;
            } else {
                keyInput.value = '';
                keyInput.classList.add('hidden');
                loginBtn.textContent = 'Login with Pollinations';
                loginBtn.onclick = loginWithPollinations;
            }

            document.getElementById('model-select').value = appState.settings.model;
            document.getElementById('system-prompt-input').value = appState.settings.systemPrompt || '';
            
            m.classList.remove('hidden'); m.classList.add('flex');
            setTimeout(() => { m.classList.remove('opacity-0'); mc.classList.remove('scale-95'); }, 10);
            if (window.innerWidth < 768 && !document.getElementById('sidebar').classList.contains('-translate-x-full')) toggleSidebar();
        }

        function logoutPollinations() {
            if(!confirm('Logout from your Pollinations account? This will unlink your key.')) return;
            appState.settings.apiKey = '';
            saveData();
            openSettings(); 
            showToast('Account unlinked successfully.');
        }

        function closeSettings() {
            const m = document.getElementById('settings-modal'), mc = m.querySelector('div');
            m.classList.add('opacity-0'); mc.classList.add('scale-95');
            setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 300);
        }

        function saveSettings() {
            const manualKey = document.getElementById('api-key-input').value.trim();
            if(!appState.settings.apiKey && manualKey) appState.settings.apiKey = manualKey;
            
            appState.settings.model = document.getElementById('model-select').value || 'openai';
            appState.settings.systemPrompt = document.getElementById('system-prompt-input').value;
            saveData(); updateModelBadge(); closeSettings();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
