<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CozyGPT - Universal AI Chat</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            50: '#f8f9fa',
                            100: '#f1f3f4',
                            200: '#e8eaed',
                            800: '#202124',
                            900: '#171717',
                        }
                    }
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
        
        /* Auto-resizing textarea */
        textarea {
            resize: none;
            overflow-y: auto;
            max-height: 200px;
        }

        /* Syntax Highlighting overrides for Prose */
        .prose pre {
            background-color: #f1f3f4;
            color: #202124;
            border-radius: 0.5rem;
        }
        .dark .prose pre {
            background-color: #2d2d30;
            color: #e8eaed;
        }
    </style>
</head>
<body class="bg-white dark:bg-gemini-900 text-gray-800 dark:text-gray-200 transition-colors duration-200">

    <div id="loading" class="fixed inset-0 z-50 flex items-center justify-center bg-white dark:bg-gemini-900">
        <div class="flex flex-col items-center space-y-4">
            <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <div class="text-lg font-medium text-gray-600 dark:text-gray-300">Loading CozyGPT...</div>
        </div>
    </div>

    <div id="app" class="hidden flex w-full min-h-[100dvh] overflow-hidden">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-20 hidden lg:hidden" onclick="toggleSidebar()"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 w-72 bg-gemini-50 dark:bg-gemini-800 border-r border-gray-200 dark:border-gray-700 transform -translate-x-full lg:relative lg:translate-x-0 transition-transform duration-300 flex flex-col">
            <div class="p-4 flex items-center justify-between">
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-purple-500">CozyGPT</h1>
                <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="px-4 pb-2">
                <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 py-2.5 px-4 bg-blue-600 hover:bg-blue-700 text-white rounded-full transition-colors shadow-sm font-medium">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    New Chat
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-3 space-y-1" id="chat-list">
                </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-700 space-y-2">
                <button onclick="toggleTheme()" class="w-full flex items-center gap-3 p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <svg id="theme-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <span id="theme-text">Dark Mode</span>
                </button>
                <button onclick="openSettings()" class="w-full flex items-center gap-3 p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Settings
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-white dark:bg-gemini-900">
            <header class="h-14 flex items-center px-4 border-b border-gray-200 dark:border-gray-800 lg:hidden sticky top-0 bg-white/80 dark:bg-gemini-900/80 backdrop-blur-md z-10">
                <button onclick="toggleSidebar()" class="p-2 -ml-2 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h2 class="ml-2 font-semibold text-lg truncate" id="mobile-title">New Chat</h2>
            </header>

            <div id="messages-container" class="flex-1 overflow-y-auto w-full max-w-4xl mx-auto px-4 py-8 space-y-8 pb-32">
                <div id="empty-state" class="flex flex-col items-center justify-center h-full text-center space-y-4 opacity-50">
                    <svg class="w-16 h-16 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                    <h2 class="text-2xl font-bold">How can I help you today?</h2>
                </div>
                </div>

            <div class="fixed bottom-0 w-full lg:w-[calc(100%-18rem)] max-w-4xl mx-auto px-4 pb-4 pt-2 bg-gradient-to-t from-white via-white to-transparent dark:from-gemini-900 dark:via-gemini-900 z-10 transition-colors">
                <div class="relative bg-white dark:bg-gemini-800 rounded-3xl border border-gray-300 dark:border-gray-600 shadow-sm focus-within:ring-1 focus-within:ring-blue-500 flex items-end px-4 py-2">
                    <textarea 
                        id="chat-input" 
                        class="w-full bg-transparent border-0 focus:ring-0 resize-none py-2 text-sm md:text-base outline-none dark:text-gray-100 min-h-[44px]"
                        rows="1" 
                        placeholder="Message CozyGPT..."
                        oninput="autoGrow(this)"
                        onkeydown="handleEnter(event)"></textarea>
                    
                    <button id="send-btn" onclick="handleSend()" class="p-2 ml-2 mb-1 rounded-full bg-blue-600 hover:bg-blue-700 text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                    
                    <button id="stop-btn" onclick="stopGeneration()" class="hidden p-2 ml-2 mb-1 rounded-full bg-red-600 hover:bg-red-700 text-white transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>
                    </button>
                </div>
                <div class="text-xs text-center text-gray-400 mt-2">CozyGPT can make mistakes. Verify important information.</div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gemini-800 w-full max-w-md rounded-2xl shadow-xl overflow-hidden transform transition-all">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <h3 class="text-xl font-semibold">Settings</h3>
                <button onclick="closeSettings()" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Model Name</label>
                    <input type="text" id="setting-model" class="w-full p-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-transparent focus:ring-2 focus:ring-blue-500 outline-none">
                    <p class="text-xs text-gray-500 mt-1">Example: deepseek/deepseek-r1:free, openai/gpt-4o, etc.</p>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">System Prompt</label>
                    <textarea id="setting-prompt" rows="3" class="w-full p-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-transparent focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>
            </div>
            <div class="p-4 border-t border-gray-200 dark:border-gray-700 flex justify-end gap-2 bg-gray-50 dark:bg-gemini-900">
                <button onclick="closeSettings()" class="px-4 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors font-medium">Cancel</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors font-medium">Save</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * COZYGPT - Vanilla JS Logic
         * Defensive & Zero-build
         */

        // HARDCODED API KEY AS REQUESTED (Warning: Do not share this HTML file publicly!)
        const POLLINATIONS_API_KEY = "sk_e8vFuCrjZv2KKWnpwN3TcUCwzqvxXB7N";

        // State Management
        const STATE = {
            chats: [],
            currentChatId: null,
            settings: {
                model: 'deepseek/deepseek-r1:free',
                systemPrompt: 'You are CozyGPT, a helpful and intelligent AI assistant. Use markdown for formatting.',
                theme: 'light'
            },
            isGenerating: false,
            abortController: null
        };

        const DOM = {
            app: document.getElementById('app'),
            loading: document.getElementById('loading'),
            sidebar: document.getElementById('sidebar'),
            sidebarOverlay: document.getElementById('sidebar-overlay'),
            chatList: document.getElementById('chat-list'),
            messagesContainer: document.getElementById('messages-container'),
            emptyState: document.getElementById('empty-state'),
            chatInput: document.getElementById('chat-input'),
            sendBtn: document.getElementById('send-btn'),
            stopBtn: document.getElementById('stop-btn'),
            settingsModal: document.getElementById('settings-modal'),
            mobileTitle: document.getElementById('mobile-title')
        };

        // --- INIT ---
        window.onload = () => {
            try {
                loadState();
                applyTheme(STATE.settings.theme);
                
                if (STATE.chats.length === 0) {
                    createNewChat(false); // don't render yet
                } else if (!STATE.currentChatId) {
                    STATE.currentChatId = STATE.chats[0].id;
                }

                renderSidebar();
                renderCurrentChat();
                
                // Reveal App
                DOM.loading.classList.add('hidden');
                DOM.app.classList.remove('hidden');
                
                // Focus input on desktop
                if(window.innerWidth > 1024) DOM.chatInput.focus();
            } catch (err) {
                console.error("Initialization Error:", err);
                DOM.loading.innerHTML = '<div class="text-red-500">Failed to load app. Check console.</div>';
            }
        };

        // --- STORAGE ---
        function loadState() {
            const savedChats = localStorage.getItem('cozy_chats');
            const savedSettings = localStorage.getItem('cozy_settings');
            const savedCurrentChat = localStorage.getItem('cozy_current');

            if (savedChats) STATE.chats = JSON.parse(savedChats);
            if (savedSettings) STATE.settings = { ...STATE.settings, ...JSON.parse(savedSettings) };
            if (savedCurrentChat && STATE.chats.some(c => c.id === savedCurrentChat)) {
                STATE.currentChatId = savedCurrentChat;
            }
        }

        function saveState() {
            localStorage.setItem('cozy_chats', JSON.stringify(STATE.chats));
            localStorage.setItem('cozy_settings', JSON.stringify(STATE.settings));
            localStorage.setItem('cozy_current', STATE.currentChatId || '');
        }

        // --- UI UTILS ---
        function toggleTheme() {
            STATE.settings.theme = STATE.settings.theme === 'light' ? 'dark' : 'light';
            applyTheme(STATE.settings.theme);
            saveState();
        }

        function applyTheme(theme) {
            const isDark = theme === 'dark';
            document.documentElement.classList.toggle('dark', isDark);
            
            const themeText = document.getElementById('theme-text');
            const themeIcon = document.getElementById('theme-icon');
            if (themeText) themeText.textContent = isDark ? 'Light Mode' : 'Dark Mode';
            
            if (themeIcon) {
                themeIcon.innerHTML = isDark 
                    ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>' 
                    : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
            }
        }

        function toggleSidebar() {
            const isClosed = DOM.sidebar.classList.contains('-translate-x-full');
            if (isClosed) {
                DOM.sidebar.classList.remove('-translate-x-full');
                DOM.sidebarOverlay.classList.remove('hidden');
            } else {
                DOM.sidebar.classList.add('-translate-x-full');
                DOM.sidebarOverlay.classList.add('hidden');
            }
        }

        function autoGrow(element) {
            element.style.height = 'auto';
            element.style.height = (element.scrollHeight) + 'px';
        }

        function scrollToBottom() {
            DOM.messagesContainer.scrollTop = DOM.messagesContainer.scrollHeight;
        }

        function formatMarkdown(text) {
            if (!text) return '';
            const rawMarkup = marked.parse(text, { breaks: true, gfm: true });
            return DOMPurify.sanitize(rawMarkup);
        }

        // --- CHAT MANAGEMENT ---
        function createNewChat(render = true) {
            const newChat = {
                id: Date.now().toString(),
                title: 'New Chat',
                messages: [],
                updatedAt: Date.now()
            };
            STATE.chats.unshift(newChat);
            STATE.currentChatId = newChat.id;
            saveState();
            
            if (render) {
                renderSidebar();
                renderCurrentChat();
                if (window.innerWidth < 1024) toggleSidebar(); // close on mobile
            }
        }

        function selectChat(id) {
            if (STATE.isGenerating) return;
            STATE.currentChatId = id;
            saveState();
            renderSidebar();
            renderCurrentChat();
            if (window.innerWidth < 1024) toggleSidebar();
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            if (STATE.isGenerating || !confirm('Delete this chat?')) return;
            
            STATE.chats = STATE.chats.filter(c => c.id !== id);
            if (STATE.chats.length === 0) {
                createNewChat(false);
            } else if (STATE.currentChatId === id) {
                STATE.currentChatId = STATE.chats[0].id;
            }
            saveState();
            renderSidebar();
            renderCurrentChat();
        }

        function renameChat(id, event) {
            event.stopPropagation();
            if (STATE.isGenerating) return;
            
            const chat = STATE.chats.find(c => c.id === id);
            const newTitle = prompt('Enter new name:', chat.title);
            if (newTitle && newTitle.trim()) {
                chat.title = newTitle.trim();
                saveState();
                renderSidebar();
            }
        }

        // --- RENDERING ---
        function renderSidebar() {
            DOM.chatList.innerHTML = '';
            STATE.chats.forEach(chat => {
                const isActive = chat.id === STATE.currentChatId;
                const div = document.createElement('div');
                div.className = `group flex items-center justify-between p-2 rounded-lg cursor-pointer transition-colors ${isActive ? 'bg-blue-100 dark:bg-gemini-900 text-blue-700 dark:text-blue-400' : 'hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300'}`;
                div.onclick = () => selectChat(chat.id);
                
                div.innerHTML = `
                    <div class="flex items-center gap-2 overflow-hidden flex-1">
                        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                        <span class="truncate text-sm font-medium">${DOMPurify.sanitize(chat.title)}</span>
                    </div>
                    <div class="hidden group-hover:flex items-center gap-1 shrink-0 ml-2">
                        <button onclick="renameChat('${chat.id}', event)" class="p-1 rounded hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-500 hover:text-gray-800 dark:hover:text-white" title="Rename"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
                        <button onclick="deleteChat('${chat.id}', event)" class="p-1 rounded hover:bg-red-200 dark:hover:bg-red-900 text-gray-500 hover:text-red-600 dark:hover:text-red-400" title="Delete"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                    </div>
                `;
                DOM.chatList.appendChild(div);
            });
        }

        function renderCurrentChat() {
            const chat = STATE.chats.find(c => c.id === STATE.currentChatId);
            if (!chat) return;

            DOM.mobileTitle.textContent = chat.title;
            
            // Clean container but keep empty state hidden for now
            Array.from(DOM.messagesContainer.children).forEach(child => {
                if (child.id !== 'empty-state') child.remove();
            });

            if (chat.messages.length === 0) {
                DOM.emptyState.classList.remove('hidden');
            } else {
                DOM.emptyState.classList.add('hidden');
                chat.messages.forEach(msg => appendMessageUI(msg.role, msg.content));
            }
            scrollToBottom();
        }

        function appendMessageUI(role, content, isStreaming = false) {
            const isUser = role === 'user';
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full ${isUser ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = `max-w-[90%] md:max-w-[80%] rounded-2xl px-5 py-3 ${
                isUser 
                ? 'bg-gray-100 dark:bg-gemini-800 text-gray-800 dark:text-gray-100' 
                : 'bg-transparent text-gray-800 dark:text-gray-200 prose prose-slate dark:prose-invert max-w-none'
            }`;
            
            if (isUser) {
                bubble.textContent = content; // pure text for user
            } else {
                bubble.innerHTML = formatMarkdown(content);
                if (isStreaming) {
                    const cursor = document.createElement('span');
                    cursor.className = 'inline-block w-2 h-4 bg-gray-400 dark:bg-gray-500 animate-pulse ml-1 align-middle';
                    cursor.id = 'typing-cursor';
                    bubble.appendChild(cursor);
                }
            }

            // AI Avatar setup for non-user
            if (!isUser) {
                const innerFlex = document.createElement('div');
                innerFlex.className = 'flex gap-4';
                
                const avatar = document.createElement('div');
                avatar.className = 'w-8 h-8 rounded-full bg-gradient-to-r from-blue-500 to-purple-500 flex items-center justify-center shrink-0 mt-1';
                avatar.innerHTML = '<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>';
                
                innerFlex.appendChild(avatar);
                innerFlex.appendChild(bubble);
                wrapper.appendChild(innerFlex);
            } else {
                wrapper.appendChild(bubble);
            }

            DOM.messagesContainer.appendChild(wrapper);
            scrollToBottom();
            return bubble; // returning bubble so streaming can update it
        }

        // --- GENERATION LOGIC ---
        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        }

        async function handleSend() {
            if (STATE.isGenerating) return;
            
            const text = DOM.chatInput.value.trim();
            if (!text) return;

            const chat = STATE.chats.find(c => c.id === STATE.currentChatId);
            if (!chat) return;

            // Auto-generate title on first message
            if (chat.messages.length === 0) {
                chat.title = text.slice(0, 30) + (text.length > 30 ? '...' : '');
                renderSidebar();
            }

            // Add user message
            chat.messages.push({ role: 'user', content: text });
            chat.updatedAt = Date.now();
            saveState();

            // UI Updates
            DOM.chatInput.value = '';
            DOM.chatInput.style.height = 'auto'; // reset height
            DOM.emptyState.classList.add('hidden');
            appendMessageUI('user', text);
            
            setGeneratingState(true);

            // API Call setup
            STATE.abortController = new AbortController();
            const messagesForAPI = [
                { role: 'system', content: STATE.settings.systemPrompt },
                ...chat.messages.map(m => ({ role: m.role, content: m.content }))
            ];

            let aiBubbleText = '';
            const bubbleNode = appendMessageUI('assistant', '', true);

            try {
                // Endpoint uses standard OpenAI format which Pollinations supports
                const response = await fetch('https://text.pollinations.ai/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${POLLINATIONS_API_KEY}` // Hardcoded key injection
                    },
                    body: JSON.stringify({
                        model: STATE.settings.model || 'deepseek/deepseek-r1:free',
                        messages: messagesForAPI,
                        stream: true
                    }),
                    signal: STATE.abortController.signal
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                // Parse SSE Stream
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // keep incomplete chunk

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed.startsWith('data: ')) continue;
                        if (trimmed === 'data: [DONE]') continue;

                        try {
                            const data = JSON.parse(trimmed.slice(6));
                            if (data.choices && data.choices[0].delta && data.choices[0].delta.content) {
                                aiBubbleText += data.choices[0].delta.content;
                                // Update UI with parsed markdown & keep cursor
                                bubbleNode.innerHTML = formatMarkdown(aiBubbleText) + '<span id="typing-cursor" class="inline-block w-2 h-4 bg-gray-400 dark:bg-gray-500 animate-pulse ml-1 align-middle"></span>';
                                scrollToBottom();
                            }
                        } catch (err) {
                            console.warn("SSE Parse Error", err, line);
                        }
                    }
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    console.log('Generation stopped by user.');
                } else {
                    console.error('Fetch Error:', err);
                    aiBubbleText += "\n\n**Error:** Failed to connect to API. Please check your settings or try again.";
                    bubbleNode.innerHTML = formatMarkdown(aiBubbleText);
                }
            } finally {
                // Remove cursor
                const cursor = bubbleNode.querySelector('#typing-cursor');
                if (cursor) cursor.remove();

                // Save Assistant Message
                if (aiBubbleText.trim()) {
                    chat.messages.push({ role: 'assistant', content: aiBubbleText });
                    saveState();
                }

                setGeneratingState(false);
                DOM.chatInput.focus();
            }
        }

        function stopGeneration() {
            if (STATE.abortController) {
                STATE.abortController.abort();
            }
        }

        function setGeneratingState(isGen) {
            STATE.isGenerating = isGen;
            DOM.sendBtn.classList.toggle('hidden', isGen);
            DOM.stopBtn.classList.toggle('hidden', !isGen);
            DOM.chatInput.disabled = isGen;
            
            if (!isGen) {
                setTimeout(scrollToBottom, 50);
            }
        }

        // --- SETTINGS MODAL ---
        function openSettings() {
            document.getElementById('setting-model').value = STATE.settings.model;
            document.getElementById('setting-prompt').value = STATE.settings.systemPrompt;
            DOM.settingsModal.classList.remove('hidden');
        }

        function closeSettings() {
            DOM.settingsModal.classList.add('hidden');
        }

        function saveSettings() {
            STATE.settings.model = document.getElementById('setting-model').value.trim() || 'deepseek/deepseek-r1:free';
            STATE.settings.systemPrompt = document.getElementById('setting-prompt').value.trim() || 'You are a helpful AI.';
            
            saveState();
            closeSettings();
        }

    </script>
</body>
</html>
