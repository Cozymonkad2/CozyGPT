<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            bg: '#f0f4f9',
                            darkbg: '#131314',
                            sidebar: '#e9eef6',
                            darksidebar: '#1e1f20',
                            userBubble: '#e3e3e3',
                            darkUserBubble: '#333537',
                            aiBubble: '#ffffff',
                            darkAiBubble: '#131314'
                        }
                    }
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .prose pre { background-color: #1e293b; color: #e2e8f0; }
        textarea { resize: none; overflow-y: hidden; }
        .typing-cursor::after {
            content: '▋';
            animation: blink 1s step-start infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-gemini-bg dark:bg-gemini-darkbg text-gray-900 dark:text-gray-100 flex min-h-[100dvh] transition-colors duration-200">

    <div id="loading" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-gemini-bg dark:bg-gemini-darkbg">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-lg font-medium text-gray-600 dark:text-gray-300">Loading App...</p>
    </div>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-gemini-sidebar dark:bg-gemini-darksidebar transform -translate-x-full md:translate-x-0 md:relative md:flex md:flex-col transition-transform duration-300 ease-in-out border-r border-gray-200 dark:border-gray-800">
        <div class="p-4 flex items-center justify-between">
            <button onclick="createNewChat()" class="flex-1 flex items-center gap-2 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-800 dark:text-gray-200 py-3 px-4 rounded-full shadow-sm transition-colors border border-gray-200 dark:border-gray-700">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span class="font-medium">New Chat</span>
            </button>
            <button onclick="toggleSidebar()" class="md:hidden ml-2 p-2 text-gray-500 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-full">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="px-4 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">Recent</div>
        <div id="chat-list" class="flex-1 overflow-y-auto px-2 space-y-1"></div>
        <div class="p-4 border-t border-gray-200 dark:border-gray-800 space-y-2">
            <button onclick="toggleTheme()" class="w-full flex items-center gap-3 px-3 py-3 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors text-sm text-gray-700 dark:text-gray-300">
                <svg id="theme-icon-moon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <svg id="theme-icon-sun" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <span id="theme-text">Dark Mode</span>
            </button>
            <button onclick="openSettings()" class="w-full flex items-center gap-3 px-3 py-3 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors text-sm text-gray-700 dark:text-gray-300">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span>Settings</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 min-h-[100dvh]">
        <header class="sticky top-0 z-10 bg-gemini-bg/80 dark:bg-gemini-darkbg/80 backdrop-blur-md px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="md:hidden p-2 -ml-2 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-full">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 class="text-xl font-semibold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">Universal AI</h1>
            </div>
            <div id="current-model-badge" class="px-3 py-1 text-xs font-medium bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 rounded-full shadow-sm border border-gray-200 dark:border-gray-700 cursor-pointer" onclick="openSettings()">
                Model: openai
            </div>
        </header>

        <div id="messages-container" class="flex-1 w-full max-w-4xl mx-auto p-4 md:p-6 pb-32 space-y-6">
            <div id="empty-state" class="hidden h-full flex-col items-center justify-center text-center opacity-50 pb-20">
                <svg class="w-16 h-16 mb-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                <h2 class="text-2xl font-bold mb-2">How can I help you today?</h2>
                <p class="max-w-md">Type a message below to start a conversation with the AI.</p>
            </div>
        </div>

        <div class="sticky bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-gemini-bg via-gemini-bg to-transparent dark:from-gemini-darkbg dark:via-gemini-darkbg pt-10">
            <div class="max-w-4xl mx-auto relative flex items-end bg-white dark:bg-[#1e1f20] rounded-3xl shadow-lg border border-gray-200 dark:border-gray-700 overflow-hidden focus-within:ring-2 focus-within:ring-blue-500/50 transition-shadow">
                <textarea id="chat-input" rows="1" class="w-full max-h-48 py-4 pl-6 pr-14 bg-transparent border-0 focus:ring-0 text-gray-900 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400" placeholder="Ask anything..."></textarea>
                <button id="send-btn" onclick="sendMessage()" class="absolute right-2 bottom-2 p-2 m-1 bg-blue-600 hover:bg-blue-700 text-white rounded-full transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg class="w-5 h-5 translate-x-[-1px] translate-y-[1px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
            <p class="text-center text-xs text-gray-500 dark:text-gray-400 mt-3">Responses are generated by AI and may be inaccurate.</p>
        </div>
    </main>

    <div id="settings-modal" class="fixed inset-0 z-[60] bg-black/60 hidden items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-md p-6 transform scale-95 transition-transform duration-300 m-4">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-900 dark:text-white">Settings</h3>
                <button onclick="closeSettings()" class="text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 p-2 rounded-full transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Pollinations API Key <span class="text-red-500">*</span></label>
                    <input type="password" id="api-key-input" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5" placeholder="pk_...">
                    <p class="text-xs text-gray-500 mt-1">Pollinations recently updated to require free keys. Get yours instantly at <a href="https://enter.pollinations.ai" target="_blank" class="text-blue-500 hover:underline">enter.pollinations.ai</a></p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">AI Model</label>
                    <select id="model-select" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5">
                        <option value="openai">OpenAI (GPT-like)</option>
                        <option value="mistral">Mistral</option>
                        <option value="llama">Llama</option>
                        <option value="search">Search (Web Grounded)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">System Prompt</label>
                    <textarea id="system-prompt-input" rows="3" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 resize-none" placeholder="You are a helpful AI assistant..."></textarea>
                </div>
            </div>
            <div class="mt-8 flex justify-end">
                <button onclick="saveSettings()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-xl transition-colors">
                    Save Changes
                </button>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_SETTINGS = {
            apiKey: '',
            model: 'openai',
            systemPrompt: 'You are a helpful and intelligent AI assistant.',
            theme: 'light'
        };

        let appState = {
            chats: [],
            currentChatId: null,
            settings: { ...DEFAULT_SETTINGS },
            isGenerating: false
        };

        function init() {
            try {
                const savedChats = localStorage.getItem('univ_ai_chats');
                if (savedChats) appState.chats = JSON.parse(savedChats);
                
                const savedSettings = localStorage.getItem('univ_ai_settings');
                if (savedSettings) appState.settings = { ...DEFAULT_SETTINGS, ...JSON.parse(savedSettings) };
                
                const savedCurrentChatId = localStorage.getItem('univ_ai_current_chat');
                if (savedCurrentChatId && appState.chats.some(c => c.id === savedCurrentChatId)) {
                    appState.currentChatId = savedCurrentChatId;
                }
            } catch (e) {
                console.error("Failed to parse localStorage data", e);
            }

            if (appState.chats.length === 0) createNewChat(false);
            if (!appState.currentChatId && appState.chats.length > 0) appState.currentChatId = appState.chats[0].id;

            applyTheme(appState.settings.theme);
            setupEventListeners();
            renderChatList();
            renderCurrentChat();
            updateModelBadge();

            setTimeout(() => {
                const loader = document.getElementById('loading');
                if (loader) loader.style.display = 'none';
                
                // Prompt for API key on first load if missing
                if (!appState.settings.apiKey) {
                    openSettings();
                }
            }, 300);
        }

        function setupEventListeners() {
            const chatInput = document.getElementById('chat-input');
            chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
                if (this.value.trim() === '') this.style.height = 'auto';
            });
            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }

        function saveData() {
            localStorage.setItem('univ_ai_chats', JSON.stringify(appState.chats));
            localStorage.setItem('univ_ai_settings', JSON.stringify(appState.settings));
            if (appState.currentChatId) localStorage.setItem('univ_ai_current_chat', appState.currentChatId);
        }

        function renderChatList() {
            const listEl = document.getElementById('chat-list');
            if (!listEl) return;
            listEl.innerHTML = '';
            
            const sortedChats = [...appState.chats].sort((a, b) => b.updatedAt - a.updatedAt);
            sortedChats.forEach(chat => {
                const isActive = chat.id === appState.currentChatId;
                const div = document.createElement('div');
                div.className = `group flex items-center justify-between px-3 py-3 rounded-xl cursor-pointer transition-colors ${isActive ? 'bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 font-medium' : 'hover:bg-gray-200 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300'}`;
                
                const titleSpan = document.createElement('span');
                titleSpan.className = 'truncate flex-1';
                titleSpan.textContent = chat.title || 'New Chat';
                titleSpan.onclick = () => selectChat(chat.id);

                const actionsDiv = document.createElement('div');
                actionsDiv.className = `flex items-center gap-1 ${isActive ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'} transition-opacity`;

                const editBtn = document.createElement('button');
                editBtn.innerHTML = `<svg class="w-4 h-4 hover:text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>`;
                editBtn.className = 'p-1 text-gray-500';
                editBtn.onclick = (e) => { e.stopPropagation(); renameChat(chat.id); };

                const delBtn = document.createElement('button');
                delBtn.innerHTML = `<svg class="w-4 h-4 hover:text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>`;
                delBtn.className = 'p-1 text-gray-500';
                delBtn.onclick = (e) => { e.stopPropagation(); deleteChat(chat.id); };

                actionsDiv.appendChild(editBtn);
                actionsDiv.appendChild(delBtn);
                div.appendChild(titleSpan);
                div.appendChild(actionsDiv);
                listEl.appendChild(div);
            });
        }

        function renderCurrentChat() {
            const container = document.getElementById('messages-container');
            const emptyState = document.getElementById('empty-state');
            if (!container || !emptyState) return;

            const currentChat = appState.chats.find(c => c.id === appState.currentChatId);
            Array.from(container.children).forEach(child => {
                if (child.id !== 'empty-state') child.remove();
            });

            if (!currentChat || currentChat.messages.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }

            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');

            currentChat.messages.forEach(msg => {
                container.appendChild(createMessageElement(msg.role, msg.content));
            });
            scrollToBottom();
        }

        function createMessageElement(role, content, isStreaming = false) {
            const div = document.createElement('div');
            div.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;

            const bubble = document.createElement('div');
            
            if (role === 'user') {
                bubble.className = 'max-w-[85%] md:max-w-[75%] px-5 py-3.5 rounded-3xl rounded-tr-sm bg-gemini-userBubble dark:bg-gemini-darkUserBubble text-gray-900 dark:text-gray-100 whitespace-pre-wrap';
                bubble.textContent = content;
            } else {
                bubble.className = 'max-w-[100%] md:max-w-[85%] px-2 py-2 text-gray-900 dark:text-gray-100 prose dark:prose-invert prose-p:leading-relaxed prose-pre:p-0 prose-pre:bg-transparent break-words';
                bubble.innerHTML = marked.parse(content || '');
                if (isStreaming) bubble.classList.add('typing-cursor');
            }

            div.appendChild(bubble);
            return div;
        }

        function scrollToBottom() {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function updateModelBadge() {
            const badge = document.getElementById('current-model-badge');
            if (badge) badge.textContent = `Model: ${appState.settings.model}`;
        }

        function createNewChat(render = true) {
            const newChat = {
                id: 'chat_' + Date.now(),
                title: 'New Chat',
                messages: [],
                createdAt: Date.now(),
                updatedAt: Date.now()
            };
            appState.chats.unshift(newChat);
            appState.currentChatId = newChat.id;
            saveData();
            if (render) {
                renderChatList();
                renderCurrentChat();
                if (window.innerWidth < 768) toggleSidebar();
            }
        }

        function selectChat(id) {
            if (appState.isGenerating) return;
            appState.currentChatId = id;
            saveData();
            renderChatList();
            renderCurrentChat();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function renameChat(id) {
            const chat = appState.chats.find(c => c.id === id);
            if (!chat) return;
            const newTitle = prompt("Enter new chat name:", chat.title);
            if (newTitle && newTitle.trim() !== '') {
                chat.title = newTitle.trim();
                chat.updatedAt = Date.now();
                saveData();
                renderChatList();
            }
        }

        function deleteChat(id) {
            if (!confirm("Are you sure you want to delete this chat?")) return;
            appState.chats = appState.chats.filter(c => c.id !== id);
            if (appState.currentChatId === id) {
                appState.currentChatId = appState.chats.length > 0 ? appState.chats[0].id : null;
                if (!appState.currentChatId) createNewChat(false);
            }
            saveData();
            renderChatList();
            renderCurrentChat();
        }

        async function sendMessage() {
            if (appState.isGenerating) return;

            if (!appState.settings.apiKey) {
                openSettings();
                alert("Please enter a free Pollinations API Key to continue.");
                return;
            }

            const inputEl = document.getElementById('chat-input');
            const text = inputEl.value.trim();
            if (!text) return;

            let chat = appState.chats.find(c => c.id === appState.currentChatId);
            if (!chat) {
                createNewChat(false);
                chat = appState.chats[0];
            }

            if (chat.messages.length === 0) chat.title = text.length > 30 ? text.substring(0, 30) + '...' : text;

            chat.messages.push({ role: 'user', content: text });
            chat.updatedAt = Date.now();
            inputEl.value = '';
            inputEl.style.height = 'auto';
            inputEl.blur(); 

            renderChatList();
            renderCurrentChat();
            
            appState.isGenerating = true;
            document.getElementById('send-btn').disabled = true;
            
            const container = document.getElementById('messages-container');
            const emptyState = document.getElementById('empty-state');
            if(emptyState) {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
            }

            const aiMsgObj = { role: 'assistant', content: '' };
            chat.messages.push(aiMsgObj);
            
            const aiNode = createMessageElement('assistant', '', true);
            container.appendChild(aiNode);
            const aiBubble = aiNode.querySelector('div > div');
            scrollToBottom();

            const apiMessages = [];
            if (appState.settings.systemPrompt && appState.settings.systemPrompt.trim() !== '') {
                apiMessages.push({ role: 'system', content: appState.settings.systemPrompt });
            }
            apiMessages.push(...chat.messages.slice(0, -1));

            try {
                // FIXED NETWORK LAYER: Brand new endpoint with proper Auth Header
                const response = await fetch('https://gen.pollinations.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'text/event-stream',
                        'Authorization': `Bearer ${appState.settings.apiKey}`
                    },
                    body: JSON.stringify({
                        model: appState.settings.model,
                        messages: apiMessages,
                        stream: true
                    })
                });

                if (response.status === 401 || response.status === 403) {
                    throw new Error("Invalid API Key. Please update it in Settings.");
                }
                if (!response.ok) {
                    throw new Error(`Connection blocked. HTTP Error ${response.status}`);
                }
                if (!response.body) throw new Error('ReadableStream not supported by browser.');

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let done = false;
                let buffer = "";

                while (!done) {
                    const { value, done: readerDone } = await reader.read();
                    done = readerDone;
                    if (value) {
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop() || "";
                        
                        for (const line of lines) {
                            const trimmedLine = line.trim();
                            if (!trimmedLine || trimmedLine.startsWith(':')) continue;
                            
                            if (trimmedLine.startsWith('data: ')) {
                                const dataStr = trimmedLine.slice(6);
                                if (dataStr === '[DONE]') {
                                    done = true;
                                    break;
                                }
                                try {
                                    const data = JSON.parse(dataStr);
                                    if (data.choices && data.choices[0] && data.choices[0].delta && data.choices[0].delta.content) {
                                        aiMsgObj.content += data.choices[0].delta.content;
                                        aiBubble.innerHTML = marked.parse(aiMsgObj.content);
                                        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 150) {
                                            scrollToBottom();
                                        }
                                    }
                                } catch (e) {
                                    // Ignore incomplete chunk parse errors silently
                                }
                            }
                        }
                    }
                }
            } catch (error) {
                console.error("API Error:", error);
                aiMsgObj.content += `\n\n**Network Error:** ${error.message}`;
                aiBubble.innerHTML = marked.parse(aiMsgObj.content);
            } finally {
                aiBubble.classList.remove('typing-cursor');
                appState.isGenerating = false;
                document.getElementById('send-btn').disabled = false;
                chat.updatedAt = Date.now();
                saveData();
                renderChatList();
                scrollToBottom();
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function toggleTheme() {
            appState.settings.theme = appState.settings.theme === 'dark' ? 'light' : 'dark';
            applyTheme(appState.settings.theme);
            saveData();
        }

        function applyTheme(theme) {
            const html = document.documentElement;
            const moon = document.getElementById('theme-icon-moon');
            const sun = document.getElementById('theme-icon-sun');
            const text = document.getElementById('theme-text');
            if (theme === 'dark') {
                html.classList.add('dark');
                moon.classList.remove('hidden');
                sun.classList.add('hidden');
                if(text) text.textContent = 'Light Mode';
            } else {
                html.classList.remove('dark');
                moon.classList.add('hidden');
                sun.classList.remove('hidden');
                if(text) text.textContent = 'Dark Mode';
            }
        }

        function openSettings() {
            const modal = document.getElementById('settings-modal');
            const modalContent = modal.querySelector('div');
            
            document.getElementById('api-key-input').value = appState.settings.apiKey || '';
            document.getElementById('model-select').value = appState.settings.model;
            document.getElementById('system-prompt-input').value = appState.settings.systemPrompt;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95', 'translate-y-4');
            }, 10);
            if (window.innerWidth < 768) toggleSidebar();
        }

        function closeSettings() {
            const modal = document.getElementById('settings-modal');
            const modalContent = modal.querySelector('div');
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95', 'translate-y-4');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        function saveSettings() {
            appState.settings.apiKey = document.getElementById('api-key-input').value.trim();
            appState.settings.model = document.getElementById('model-select').value;
            appState.settings.systemPrompt = document.getElementById('system-prompt-input').value;
            saveData();
            updateModelBadge();
            closeSettings();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
