<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CozyGPT - Universal AI Chat</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { gemini: { 50: '#f8f9fa', 100: '#f1f3f4', 200: '#e8eaed', 800: '#202124', 900: '#171717' } } } }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        textarea { resize: none; overflow-y: auto; max-height: 200px; }
        .prose pre { background-color: #f1f3f4; color: #202124; border-radius: 0.5rem; }
        .dark .prose pre { background-color: #2d2d30; color: #e8eaed; }
    </style>
</head>
<body class="bg-white dark:bg-gemini-900 text-gray-800 dark:text-gray-200 transition-colors duration-200">

    <div id="loading" class="fixed inset-0 z-50 flex items-center justify-center bg-white dark:bg-gemini-900">
        <div class="flex flex-col items-center space-y-4">
            <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <div class="text-lg font-medium text-gray-600 dark:text-gray-300">Connecting to Pollinations...</div>
        </div>
    </div>

    <div id="app" class="hidden flex w-full min-h-[100dvh] overflow-hidden">
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-20 hidden lg:hidden" onclick="toggleSidebar()"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 w-72 bg-gemini-50 dark:bg-gemini-800 border-r border-gray-200 dark:border-gray-700 transform -translate-x-full lg:relative lg:translate-x-0 transition-transform duration-300 flex flex-col">
            <div class="p-4 flex items-center justify-between">
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-purple-500">CozyGPT</h1>
                <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="px-4 pb-2">
                <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 py-2.5 px-4 bg-blue-600 hover:bg-blue-700 text-white rounded-full font-medium">New Chat</button>
            </div>
            <div class="flex-1 overflow-y-auto p-3 space-y-1" id="chat-list"></div>
            <div class="p-4 border-t border-gray-200 dark:border-gray-700 space-y-2">
                <button onclick="toggleTheme()" class="w-full flex items-center gap-3 p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <span id="theme-text">Mode</span>
                </button>
                <button onclick="openSettings()" class="w-full flex items-center gap-3 p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">Settings</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-white dark:bg-gemini-900">
            <header class="h-14 flex items-center px-4 border-b border-gray-200 dark:border-gray-800 lg:hidden sticky top-0 bg-white/80 dark:bg-gemini-900/80 backdrop-blur-md z-10">
                <button onclick="toggleSidebar()" class="p-2 -ml-2 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h2 class="ml-2 font-semibold text-lg truncate" id="mobile-title">New Chat</h2>
            </header>

            <div id="messages-container" class="flex-1 overflow-y-auto w-full max-w-4xl mx-auto px-4 py-8 space-y-8 pb-32">
                <div id="empty-state" class="flex flex-col items-center justify-center h-full text-center space-y-4 opacity-50">
                    <h2 class="text-2xl font-bold">Pollinations AI Ready</h2>
                </div>
            </div>

            <div class="fixed bottom-0 w-full lg:w-[calc(100%-18rem)] max-w-4xl mx-auto px-4 pb-4 pt-2 bg-gradient-to-t from-white dark:from-gemini-900">
                <div class="relative bg-white dark:bg-gemini-800 rounded-3xl border border-gray-300 dark:border-gray-600 shadow-sm flex items-end px-4 py-2">
                    <textarea id="chat-input" class="w-full bg-transparent border-0 focus:ring-0 resize-none py-2 outline-none dark:text-gray-100 min-h-[44px]" rows="1" placeholder="Message CozyGPT..." oninput="autoGrow(this)" onkeydown="handleEnter(event)"></textarea>
                    <button id="send-btn" onclick="handleSend()" class="p-2 ml-2 mb-1 rounded-full bg-blue-600 text-white">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                    <button id="stop-btn" onclick="stopGeneration()" class="hidden p-2 ml-2 mb-1 rounded-full bg-red-600 text-white">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0zM9 10h6v6H9v-6z"></path></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gemini-800 w-full max-w-md rounded-2xl shadow-xl p-6">
            <h3 class="text-xl font-semibold mb-4">Settings</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Model Name</label>
                    <input type="text" id="setting-model" class="w-full p-2 border rounded-lg bg-transparent dark:border-gray-600">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">System Prompt</label>
                    <textarea id="setting-prompt" rows="3" class="w-full p-2 border rounded-lg bg-transparent dark:border-gray-600"></textarea>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-2">
                <button onclick="closeSettings()" class="px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">Cancel</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-blue-600 text-white rounded-lg">Save</button>
            </div>
        </div>
    </div>

    <script>
        const POLLINATIONS_API_KEY = "sk_e8vFuCrjZv2KKWnpwN3TcUCwzqvxXB7N";
        const STATE = { chats: [], currentChatId: null, settings: { model: 'openai', systemPrompt: 'You are a helpful AI.', theme: 'light' }, isGenerating: false, abortController: null };
        const DOM = { app: document.getElementById('app'), loading: document.getElementById('loading'), sidebar: document.getElementById('sidebar'), chatList: document.getElementById('chat-list'), messagesContainer: document.getElementById('messages-container'), emptyState: document.getElementById('empty-state'), chatInput: document.getElementById('chat-input'), sendBtn: document.getElementById('send-btn'), stopBtn: document.getElementById('stop-btn'), settingsModal: document.getElementById('settings-modal'), mobileTitle: document.getElementById('mobile-title') };

        window.onload = () => {
            loadState();
            applyTheme(STATE.settings.theme);
            if (!STATE.chats.length) createNewChat(false);
            else if (!STATE.currentChatId) STATE.currentChatId = STATE.chats[0].id;
            renderSidebar();
            renderCurrentChat();
            DOM.loading.classList.add('hidden');
            DOM.app.classList.remove('hidden');
        };

        function loadState() {
            const c = localStorage.getItem('cozy_chats');
            const s = localStorage.getItem('cozy_settings');
            if (c) STATE.chats = JSON.parse(c);
            if (s) STATE.settings = { ...STATE.settings, ...JSON.parse(s) };
            STATE.currentChatId = localStorage.getItem('cozy_current');
        }

        function saveState() {
            localStorage.setItem('cozy_chats', JSON.stringify(STATE.chats));
            localStorage.setItem('cozy_settings', JSON.stringify(STATE.settings));
            localStorage.setItem('cozy_current', STATE.currentChatId || '');
        }

        function applyTheme(t) {
            document.documentElement.classList.toggle('dark', t === 'dark');
            document.getElementById('theme-text').textContent = t === 'dark' ? 'Light Mode' : 'Dark Mode';
        }

        function toggleTheme() {
            STATE.settings.theme = STATE.settings.theme === 'light' ? 'dark' : 'light';
            applyTheme(STATE.settings.theme);
            saveState();
        }

        function createNewChat(render = true) {
            const chat = { id: Date.now().toString(), title: 'New Chat', messages: [], updatedAt: Date.now() };
            STATE.chats.unshift(chat);
            STATE.currentChatId = chat.id;
            saveState();
            if (render) { renderSidebar(); renderCurrentChat(); }
        }

        function selectChat(id) {
            STATE.currentChatId = id;
            saveState();
            renderSidebar();
            renderCurrentChat();
        }

        function renderSidebar() {
            DOM.chatList.innerHTML = STATE.chats.map(chat => `
                <div onclick="selectChat('${chat.id}')" class="p-2 rounded-lg cursor-pointer ${chat.id === STATE.currentChatId ? 'bg-blue-100 dark:bg-gemini-900' : 'hover:bg-gray-200 dark:hover:bg-gray-700'}">
                    <div class="truncate text-sm">${chat.title}</div>
                </div>
            `).join('');
        }

        function renderCurrentChat() {
            const chat = STATE.chats.find(c => c.id === STATE.currentChatId);
            if (!chat) return;
            DOM.messagesContainer.innerHTML = '<div id="empty-state" class="hidden"></div>';
            if (!chat.messages.length) document.getElementById('empty-state').classList.remove('hidden');
            chat.messages.forEach(m => appendMessageUI(m.role, m.content));
            scrollToBottom();
        }

        function appendMessageUI(role, content, isStreaming = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] rounded-2xl px-4 py-2 ${role === 'user' ? 'bg-gray-100 dark:bg-gemini-800' : 'prose dark:prose-invert'}`;
            
            if (role === 'user') bubble.textContent = content;
            else {
                bubble.innerHTML = DOMPurify.sanitize(marked.parse(content));
                if (isStreaming) {
                    const cursor = document.createElement('span');
                    cursor.id = 'cursor';
                    cursor.className = 'inline-block w-2 h-4 bg-blue-500 animate-pulse ml-1';
                    bubble.appendChild(cursor);
                }
            }
            wrapper.appendChild(bubble);
            DOM.messagesContainer.appendChild(wrapper);
            scrollToBottom();
            return bubble;
        }

        async function handleSend() {
            const input = DOM.chatInput.value.trim();
            if (!input || STATE.isGenerating) return;

            const chat = STATE.chats.find(c => c.id === STATE.currentChatId);
            if (chat.messages.length === 0) chat.title = input.slice(0, 25);
            
            chat.messages.push({ role: 'user', content: input });
            DOM.chatInput.value = '';
            renderCurrentChat();
            
            STATE.isGenerating = true;
            DOM.sendBtn.classList.add('hidden');
            DOM.stopBtn.classList.remove('hidden');

            STATE.abortController = new AbortController();
            let aiResponse = '';
            const bubble = appendMessageUI('assistant', '', true);

            try {
                // PRIMARY FIX: Stabilized text endpoint with explicit CORS mode
                const response = await fetch('https://text.pollinations.ai/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${POLLINATIONS_API_KEY}` },
                    mode: 'cors',
                    body: JSON.stringify({
                        model: STATE.settings.model,
                        messages: [{ role: 'system', content: STATE.settings.systemPrompt }, ...chat.messages],
                        stream: true
                    }),
                    signal: STATE.abortController.signal
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                const content = data.choices?.[0]?.delta?.content || "";
                                aiResponse += content;
                                bubble.innerHTML = DOMPurify.sanitize(marked.parse(aiResponse)) + '<span class="inline-block w-2 h-4 bg-blue-500 animate-pulse ml-1"></span>';
                                scrollToBottom();
                            } catch (e) {}
                        }
                    }
                }
            } catch (err) {
                aiResponse += `\n\n**Error:** ${err.message}. Ensure model is 'openai' or 'deepseek'.`;
                bubble.innerHTML = DOMPurify.sanitize(marked.parse(aiResponse));
            } finally {
                STATE.isGenerating = false;
                DOM.sendBtn.classList.remove('hidden');
                DOM.stopBtn.classList.add('hidden');
                chat.messages.push({ role: 'assistant', content: aiResponse });
                saveState();
                renderCurrentChat();
            }
        }

        function autoGrow(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
        function handleEnter(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }
        function scrollToBottom() { DOM.messagesContainer.scrollTop = DOM.messagesContainer.scrollHeight; }
        function stopGeneration() { if (STATE.abortController) STATE.abortController.abort(); }
        function openSettings() { DOM.settingsModal.classList.remove('hidden'); document.getElementById('setting-model').value = STATE.settings.model; document.getElementById('setting-prompt').value = STATE.settings.systemPrompt; }
        function closeSettings() { DOM.settingsModal.classList.add('hidden'); }
        function saveSettings() { STATE.settings.model = document.getElementById('setting-model').value; STATE.settings.systemPrompt = document.getElementById('setting-prompt').value; saveState(); closeSettings(); }
        function toggleSidebar() { DOM.sidebar.classList.toggle('-translate-x-full'); DOM.sidebarOverlay.classList.toggle('hidden'); }
    </script>
</body>
</html>
